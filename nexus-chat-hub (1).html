<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus Chat Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root {
  --bg: #08080e;
  --bg2: #0f0f18;
  --bg3: #15151f;
  --surface: #1a1a27;
  --surface2: #222233;
  --border: rgba(130,100,255,0.12);
  --border2: rgba(130,100,255,0.28);
  --accent: #7c5cfc;
  --accent2: #9d7dfd;
  --accent3: #f472b6;
  --text: #ede8ff;
  --text2: #9b94b8;
  --text3: #5c566e;
  --msg-self: linear-gradient(135deg, #2d1f70, #3a1f5a);
  --msg-other: #1a1a27;
  --glow: rgba(124,92,252,0.18);
  --online: #22d3a0;
  --danger: #f87171;
  --font: 'Syne', sans-serif;
  --body: 'DM Sans', sans-serif;
}

body.light {
  --bg: #f0ecff;
  --bg2: #e8e2ff;
  --bg3: #dcd4ff;
  --surface: #ffffff;
  --surface2: #f5f0ff;
  --border: rgba(100,60,220,0.1);
  --border2: rgba(100,60,220,0.25);
  --accent: #6d28d9;
  --accent2: #7c3aed;
  --accent3: #db2777;
  --text: #1a1040;
  --text2: #5a4d80;
  --text3: #9d8fc0;
  --msg-self: linear-gradient(135deg, #ede9fe, #ddd6fe);
  --msg-other: #ffffff;
  --glow: rgba(109,40,217,0.1);
  --online: #059669;
  --danger: #dc2626;
}

html, body {
  height: 100%;
  font-family: var(--body);
  background: var(--bg);
  color: var(--text);
  transition: background 0.3s, color 0.3s;
  overflow: hidden;
}

.app {
  display: grid;
  grid-template-rows: 56px 1fr;
  grid-template-columns: 240px 1fr;
  height: 100vh;
}

header {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  z-index: 10;
}

.logo { display: flex; align-items: baseline; gap: 10px; }
.logo-text {
  font-family: var(--font);
  font-weight: 800;
  font-size: 18px;
  letter-spacing: -0.5px;
  background: linear-gradient(135deg, #a78bfa, #f472b6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.logo-sub { font-size: 11px; color: var(--text3); letter-spacing: 2px; text-transform: uppercase; }

.header-actions { display: flex; align-items: center; gap: 14px; }
.live-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 4px 12px 4px 8px;
  font-size: 12px;
  color: var(--text2);
}
.pulse-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--online);
  box-shadow: 0 0 6px var(--online);
  animation: pulse 2.2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.85)} }

.icon-btn {
  width: 34px; height: 34px;
  border-radius: 9px;
  border: 1px solid var(--border2);
  background: var(--surface);
  color: var(--text);
  cursor: pointer;
  font-size: 15px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.icon-btn:hover { background: var(--surface2); border-color: var(--accent); transform: scale(1.05); }

aside {
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.profile-section {
  padding: 16px;
  border-bottom: 1px solid var(--border);
}
.profile-section label {
  display: block;
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 8px;
  font-family: var(--font);
}
.name-field {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 9px;
  padding: 8px 11px;
  color: var(--text);
  font-family: var(--body);
  font-size: 13px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.name-field:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--glow); }
.name-field::placeholder { color: var(--text3); }

.avatar-section { margin-top: 10px; }
.avatar-section label {
  display: block;
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 6px;
  font-family: var(--font);
}
.avatar-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px; }
.av {
  aspect-ratio: 1;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  cursor: pointer;
  border: 2px solid transparent;
  transition: all 0.18s;
  background: var(--surface);
}
.av:hover { transform: scale(1.12); background: var(--surface2); }
.av.on { border-color: var(--accent); box-shadow: 0 0 10px var(--glow); }

.section-label {
  padding: 14px 16px 6px;
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text3);
  font-family: var(--font);
  font-weight: 600;
}

.rooms { flex: 1; overflow-y: auto; padding: 4px 8px; }
.rooms::-webkit-scrollbar { width: 3px; }
.rooms::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

.room-btn {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 10px;
  border-radius: 10px;
  border: 1px solid transparent;
  background: transparent;
  color: var(--text2);
  cursor: pointer;
  margin-bottom: 2px;
  font-family: var(--font);
  font-size: 13px;
  font-weight: 600;
  transition: all 0.18s;
  text-align: left;
}
.room-btn:hover { background: var(--surface); color: var(--text); }
.room-btn.on { background: var(--surface); color: var(--text); border-color: var(--border); }

.room-icon { font-size: 15px; flex-shrink: 0; }
.room-name { flex: 1; }
.room-badge {
  font-size: 10px;
  background: var(--accent);
  color: #fff;
  border-radius: 10px;
  padding: 1px 6px;
  min-width: 18px;
  text-align: center;
  font-family: var(--body);
  font-weight: 500;
}

.me-bar {
  padding: 12px 14px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
}
.me-avatar {
  width: 36px; height: 36px;
  border-radius: 10px;
  background: var(--surface2);
  display: flex; align-items: center; justify-content: center;
  font-size: 19px;
  flex-shrink: 0;
  border: 1px solid var(--border);
}
.me-name { font-family: var(--font); font-weight: 700; font-size: 13px; }
.me-status { font-size: 11px; color: var(--online); display: flex; align-items: center; gap: 4px; }
.me-status::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: var(--online); display: inline-block; }

main { display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }

.chat-header {
  height: 52px;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
  display: flex;
  align-items: center;
  padding: 0 22px;
  gap: 12px;
  flex-shrink: 0;
}
.chat-header .ch-icon { font-size: 18px; }
.chat-header .ch-name { font-family: var(--font); font-weight: 700; font-size: 15px; }
.chat-header .ch-desc { font-size: 12px; color: var(--text3); margin-left: 2px; }
.chat-header .sep { color: var(--text3); opacity: 0.4; }

.messages-wrap {
  flex: 1;
  overflow-y: auto;
  padding: 18px 22px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.messages-wrap::-webkit-scrollbar { width: 5px; }
.messages-wrap::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 5px; }

.date-sep {
  text-align: center;
  font-size: 11px;
  color: var(--text3);
  margin: 12px 0 6px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.date-sep::before, .date-sep::after { content: ''; flex: 1; height: 1px; background: var(--border); }

.msg-row {
  display: flex;
  gap: 9px;
  align-items: flex-end;
  margin-bottom: 6px;
  animation: slideIn 0.22s ease;
}
.msg-row.me { flex-direction: row-reverse; }
@keyframes slideIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

.msg-av {
  width: 30px; height: 30px;
  border-radius: 9px;
  font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  background: var(--surface2);
  flex-shrink: 0;
  border: 1px solid var(--border);
}
.msg-body { max-width: 58%; }
.msg-who {
  font-size: 11px;
  font-family: var(--font);
  font-weight: 600;
  color: var(--text3);
  margin-bottom: 3px;
  letter-spacing: 0.2px;
}
.msg-row.me .msg-who { text-align: right; color: var(--accent2); }

.bubble {
  padding: 9px 13px;
  border-radius: 14px;
  font-size: 14px;
  line-height: 1.55;
  word-break: break-word;
  white-space: pre-wrap;
}
.msg-row:not(.me) .bubble { background: var(--msg-other); border: 1px solid var(--border); border-radius: 3px 14px 14px 14px; }
.msg-row.me .bubble { background: var(--msg-self); border: 1px solid rgba(130,100,255,0.2); border-radius: 14px 3px 14px 14px; }
body.light .msg-row.me .bubble { color: #1a1040; }

.msg-ts { font-size: 10px; color: var(--text3); margin-top: 3px; }
.msg-row.me .msg-ts { text-align: right; }

.typing-row {
  min-height: 28px;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 2px 22px;
  font-size: 12px;
  color: var(--text3);
  flex-shrink: 0;
}
.dots { display: flex; gap: 3px; align-items: center; }
.dots i { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); display: block; animation: bop 1.1s infinite; font-style: normal; }
.dots i:nth-child(2) { animation-delay: 0.18s; }
.dots i:nth-child(3) { animation-delay: 0.36s; }
@keyframes bop { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }

.input-zone { padding: 12px 22px 16px; border-top: 1px solid var(--border); background: var(--bg2); flex-shrink: 0; }
.emoji-bar { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
.eq { font-size: 19px; cursor: pointer; padding: 2px 3px; border-radius: 6px; line-height: 1; transition: transform 0.15s, background 0.15s; user-select: none; }
.eq:hover { transform: scale(1.3); background: var(--surface); }

.input-box {
  display: flex;
  gap: 10px;
  align-items: flex-end;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 10px 12px;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.input-box:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--glow); }

#msgInput {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: var(--text);
  font-family: var(--body);
  font-size: 14px;
  resize: none;
  min-height: 22px;
  max-height: 110px;
  line-height: 1.5;
}
#msgInput::placeholder { color: var(--text3); }

.send-btn {
  width: 36px; height: 36px;
  border-radius: 10px;
  background: var(--accent);
  border: none;
  color: #fff;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all 0.18s;
}
.send-btn:hover { background: var(--accent2); transform: scale(1.07); }
.send-btn:active { transform: scale(0.94); }
.send-btn svg { width: 15px; height: 15px; }

.empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text3); gap: 8px; padding: 40px; text-align: center; }
.empty .e-icon { font-size: 42px; margin-bottom: 6px; }
.empty .e-big { font-family: var(--font); font-size: 22px; font-weight: 800; color: var(--text2); }
.empty .e-sub { font-size: 13px; }

#toast {
  position: fixed;
  bottom: 22px; right: 22px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 12px;
  padding: 11px 16px;
  font-size: 13px;
  color: var(--text);
  box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  transform: translateY(60px);
  opacity: 0;
  transition: all 0.28s cubic-bezier(0.34,1.56,0.64,1);
  z-index: 999;
  pointer-events: none;
  max-width: 260px;
}
#toast.show { transform: translateY(0); opacity: 1; }

* { scrollbar-width: thin; scrollbar-color: var(--border2) transparent; }

/* Loading overlay */
#loadingOverlay {
  position: fixed; inset: 0;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  flex-direction: column;
  gap: 16px;
  z-index: 9999;
  transition: opacity 0.4s;
}
#loadingOverlay.hidden { opacity: 0; pointer-events: none; }
.load-logo { font-family: var(--font); font-weight: 800; font-size: 28px; background: linear-gradient(135deg, #a78bfa, #f472b6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.load-dots { display: flex; gap: 6px; }
.load-dots span { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); animation: bop 1.1s infinite; }
.load-dots span:nth-child(2) { animation-delay: 0.2s; }
.load-dots span:nth-child(3) { animation-delay: 0.4s; }

@media (max-width: 640px) {
  .app { grid-template-columns: 1fr; grid-template-rows: 56px auto 1fr; }
  aside { max-height: 240px; border-right: none; border-bottom: 1px solid var(--border); }
  .profile-section { display: flex; gap: 12px; align-items: flex-start; }
  .avatar-section { min-width: 140px; }
}
</style>
</head>
<body>

<!-- Loading overlay -->
<div id="loadingOverlay">
  <div class="load-logo">✦ NEXUS</div>
  <div class="load-dots"><span></span><span></span><span></span></div>
</div>

<div class="app">
  <header>
    <div class="logo">
      <span class="logo-text">✦ NEXUS</span>
      <span class="logo-sub">Chat Hub</span>
    </div>
    <div class="header-actions">
      <div class="live-badge">
        <span class="pulse-dot"></span>
        <span id="onlineCount">1 online</span>
      </div>
      <button class="icon-btn" id="themeBtn" title="Toggle theme">☀️</button>
    </div>
  </header>

  <aside>
    <div class="profile-section">
      <label>Your Name</label>
      <input class="name-field" id="nameInput" placeholder="Anonymous..." maxlength="22">
      <div class="avatar-section">
        <label>Avatar</label>
        <div class="avatar-grid" id="avatarGrid"></div>
      </div>
    </div>

    <div class="section-label">Rooms</div>
    <div class="rooms" id="roomsList"></div>

    <div class="me-bar">
      <div class="me-avatar" id="meAvatar">👤</div>
      <div>
        <div class="me-name" id="meName">Anonymous</div>
        <div class="me-status">Active</div>
      </div>
    </div>
  </aside>

  <main>
    <div class="chat-header">
      <span class="ch-icon" id="chIcon">✦</span>
      <span class="ch-name" id="chName">General</span>
      <span class="sep">·</span>
      <span class="ch-desc" id="chDesc">Everyone's welcome here</span>
    </div>

    <div class="messages-wrap" id="msgsWrap"></div>
    <div class="typing-row" id="typingRow"></div>

    <div class="input-zone">
      <div class="emoji-bar" id="emojiBar"></div>
      <div class="input-box">
        <textarea id="msgInput" rows="1" placeholder="Type a message…"></textarea>
        <button class="send-btn" id="sendBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </div>
  </main>
</div>

<div id="toast"></div>

<script>
// ─── FIREBASE CONFIG ──────────────────────────────────────────────────────────
// Uses a shared public Firebase project for Nexus Chat Hub
// Messages are public — don't share sensitive info
const firebaseConfig = {
  apiKey: "AIzaSyC4QQpBklNPbfh53gZivCqXwXgEgGQTzFo",
  authDomain: "nexus-chat-hub-public.firebaseapp.com",
  databaseURL: "https://nexus-chat-hub-public-default-rtdb.firebaseio.com",
  projectId: "nexus-chat-hub-public",
  storageBucket: "nexus-chat-hub-public.appspot.com",
  messagingSenderId: "000000000000",
  appId: "1:000000000000:web:000000000000000000"
};

// NOTE TO USER: You need your own Firebase project for this to work.
// See instructions in the toast on load. The app will fall back to
// localStorage if Firebase is unavailable (same-device only).

// ─── CONFIG ───────────────────────────────────────────────────────────────────
const AVATARS = ['🌟','🦋','🐉','🌈','🔥','⚡','🌙','🎭','🦁','🐺','🦊','🌸','💎','🎯','🍀','🎪','🦄','🌊','☄️','🎸'];
const COLORS  = ['rgba(124,92,252,0.18)','rgba(244,114,182,0.18)','rgba(34,211,160,0.18)','rgba(251,191,36,0.18)','rgba(96,165,250,0.18)','rgba(248,113,113,0.18)'];
const EMOJIS  = ['👋','❤️','🔥','✨','😂','💀','👏','🎉','💜','🤝','😍','🥳','🤯','💯','🫂'];
const ROOMS   = [
  { id:'general',  icon:'✦',  name:'General',    desc:"Everyone's welcome here" },
  { id:'vibes',    icon:'🎵',  name:'Vibes Only', desc:'Music, art, and good energy' },
  { id:'tech',     icon:'⚡',  name:'Tech Talk',  desc:'Code, gadgets, and the future' },
  { id:'random',   icon:'🎲',  name:'Random',     desc:'Anything goes, seriously' },
  { id:'creative', icon:'🎨',  name:'Creative',   desc:'Art, design, and imagination' },
];
const MAX_MSGS = 100;
const TYPING_TIMEOUT = 4000;

// ─── STATE ────────────────────────────────────────────────────────────────────
const uid = localStorage.getItem('nx_uid') || 'u_' + Math.random().toString(36).slice(2,9);
localStorage.setItem('nx_uid', uid);

let S = {
  name:   localStorage.getItem('nx_name')   || '',
  avatar: localStorage.getItem('nx_avatar') || AVATARS[0],
  room:   localStorage.getItem('nx_room')   || 'general',
  light:  localStorage.getItem('nx_theme')  === 'light',
  typingTimer: null,
  roomListeners: {},   // Firebase listeners per room
  presenceRef: null,
  typingRef: null,
  useFirebase: false,
};

let db = null;

// ─── FIREBASE INIT ────────────────────────────────────────────────────────────
function initFirebase() {
  return new Promise((resolve) => {
    try {
      // Check if Firebase SDK loaded
      if (typeof firebase === 'undefined') { resolve(false); return; }

      firebase.initializeApp(firebaseConfig);
      db = firebase.database();

      // Test connection with a quick read
      const testRef = db.ref('.info/connected');
      const timeout = setTimeout(() => { resolve(false); }, 5000);

      testRef.once('value', snap => {
        clearTimeout(timeout);
        if (snap.val() === true) {
          S.useFirebase = true;
          resolve(true);
        } else {
          resolve(false);
        }
      }, () => { clearTimeout(timeout); resolve(false); });

    } catch(e) {
      console.warn('Firebase init failed:', e);
      resolve(false);
    }
  });
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
async function init() {
  applyTheme();
  buildAvatars();
  buildRooms();
  buildEmojis();
  bindInput();
  bindTheme();
  applyProfile();

  const fbOk = await initFirebase();

  // Hide loading overlay
  const overlay = document.getElementById('loadingOverlay');
  overlay.classList.add('hidden');

  if (fbOk) {
    setupPresence();
    switchRoom(S.room, true);
    toast('🌐 Live sync active — all devices connected!');
  } else {
    // Fallback: show setup instructions
    switchRoomLocalFallback(S.room, true);
    showFirebaseSetupToast();
  }
}

// ─── FIREBASE SETUP INSTRUCTIONS ─────────────────────────────────────────────
function showFirebaseSetupToast() {
  const el = document.getElementById('toast');
  el.innerHTML = `⚠️ <b>Setup needed</b> — see console for instructions`;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 6000);

  console.log(`
╔══════════════════════════════════════════════════════════════╗
║          NEXUS CHAT HUB — MULTI-DEVICE SETUP                 ║
╠══════════════════════════════════════════════════════════════╣
║                                                              ║
║  To enable real-time cross-device chat, you need a FREE      ║
║  Firebase Realtime Database. Here's how:                     ║

// ─── THEME ────────────────────────────────────────────────────────────────────
function applyTheme() {
  document.body.classList.toggle('light', S.light);
  document.getElementById('themeBtn').textContent = S.light ? '🌙' : '☀️';
}
function bindTheme() {
  document.getElementById('themeBtn').onclick = () => {
    S.light = !S.light;
    localStorage.setItem('nx_theme', S.light ? 'light' : '');
    applyTheme();
  };
}

// ─── AVATARS ──────────────────────────────────────────────────────────────────
function buildAvatars() {
  const grid = document.getElementById('avatarGrid');
  AVATARS.slice(0, 12).forEach((av, i) => {
    const el = document.createElement('div');
    el.className = 'av' + (av === S.avatar ? ' on' : '');
    el.textContent = av;
    el.style.background = COLORS[i % COLORS.length];
    el.onclick = () => {
      S.avatar = av;
      localStorage.setItem('nx_avatar', av);
      document.querySelectorAll('.av').forEach(e => e.classList.remove('on'));
      el.classList.add('on');
      applyProfile();
      if (S.useFirebase) updatePresenceFirebase();
    };
    grid.appendChild(el);
  });
}

// ─── ROOMS ────────────────────────────────────────────────────────────────────
function buildRooms() {
  const list = document.getElementById('roomsList');
  ROOMS.forEach(r => {
    const btn = document.createElement('button');
    btn.className = 'room-btn' + (r.id === S.room ? ' on' : '');
    btn.dataset.id = r.id;
    btn.innerHTML = `<span class="room-icon">${r.icon}</span><span class="room-name">${r.name}</span><span class="room-badge" id="badge_${r.id}" style="display:none"></span>`;
    btn.onclick = () => switchRoom(r.id);
    list.appendChild(btn);
  });
}

// ─── PROFILE ──────────────────────────────────────────────────────────────────
function applyProfile() {
  const name = S.name || 'Anonymous';
  document.getElementById('meAvatar').textContent = S.avatar;
  document.getElementById('meName').textContent   = name;
}

function bindInput() {
  const nameIn = document.getElementById('nameInput');
  nameIn.value = S.name;
  nameIn.oninput = () => {
    S.name = nameIn.value.trim();
    localStorage.setItem('nx_name', S.name);
    applyProfile();
  };

  const inp = document.getElementById('msgInput');
  inp.oninput = () => {
    inp.style.height = '22px';
    inp.style.height = Math.min(inp.scrollHeight, 110) + 'px';
    if (S.useFirebase) markTypingFirebase();
  };
  inp.onkeydown = e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  };
  document.getElementById('sendBtn').onclick = send;
}

function buildEmojis() {
  const bar = document.getElementById('emojiBar');
  EMOJIS.forEach(em => {
    const sp = document.createElement('span');
    sp.className = 'eq';
    sp.textContent = em;
    sp.onclick = () => {
      const inp = document.getElementById('msgInput');
      inp.value += em;
      inp.focus();
    };
    bar.appendChild(sp);
  });
}

// ─── ROOM SWITCHING ──────────────────────────────────────────────────────────
function switchRoom(id, initial=false) {
  // Detach old listeners
  if (S.useFirebase) detachRoomListeners();

  S.room = id;
  localStorage.setItem('nx_room', id);

  document.querySelectorAll('.room-btn').forEach(b => b.classList.toggle('on', b.dataset.id === id));

  const r = ROOMS.find(x => x.id === id);
  document.getElementById('chIcon').textContent = r.icon;
  document.getElementById('chName').textContent  = r.name;
  document.getElementById('chDesc').textContent  = r.desc;

  // Clear badge
  const badge = document.getElementById('badge_' + id);
  if (badge) badge.style.display = 'none';

  if (S.useFirebase) {
    listenRoom(id);
    updatePresenceFirebase();
    listenTyping(id);
    listenPresence();
  } else {
    switchRoomLocalFallback(id, initial);
  }
}

// ─── FIREBASE: MESSAGES ───────────────────────────────────────────────────────
function listenRoom(roomId) {
  const ref = db.ref(`rooms/${roomId}/messages`).limitToLast(MAX_MSGS);
  let firstLoad = true;

  const handler = ref.on('value', snap => {
    const data = snap.val() || {};
    const msgs = Object.values(data).sort((a, b) => a.ts - b.ts);

    renderMessages(msgs, true);

    // Badge for other rooms — count new messages
    if (!firstLoad) {
      ROOMS.forEach(r => {
        if (r.id !== S.room) {
          const badge = document.getElementById('badge_' + r.id);
          // Will be updated by child_added listener below
        }
      });
    }
    firstLoad = false;
  });

  S.roomListeners[roomId] = { ref, handler };
}

function detachRoomListeners() {
  Object.entries(S.roomListeners).forEach(([rid, { ref, handler }]) => {
    ref.off('value', handler);
  });
  S.roomListeners = {};

  if (S.typingRef) { S.typingRef.off(); S.typingRef = null; }
}

// ─── FIREBASE: SEND ──────────────────────────────────────────────────────────
async function send() {
  const inp  = document.getElementById('msgInput');
  const text = inp.value.trim();
  if (!text) return;
  inp.value = '';
  inp.style.height = '22px';

  const msg = {
    uid,
    name:   S.name || 'Anonymous',
    avatar: S.avatar,
    text,
    ts:     Date.now(),
  };

  if (S.useFirebase) {
    try {
      await db.ref(`rooms/${S.room}/messages`).push(msg);
      if (S.typingRef) {
        db.ref(`rooms/${S.room}/typing/${uid}`).remove();
      }
    } catch(e) {
      console.error('Send failed:', e);
      toast('❌ Failed to send. Check connection.');
    }
  } else {
    // localStorage fallback
    const msgs = loadMsgsLocal(S.room);
    msgs.push({ ...msg, id: uid + '_' + Date.now() });
    saveMsgsLocal(S.room, msgs);
    renderMessages(msgs, true);
  }
}

// ─── FIREBASE: TYPING ─────────────────────────────────────────────────────────
function markTypingFirebase() {
  if (S.typingTimer) clearTimeout(S.typingTimer);
  db.ref(`rooms/${S.room}/typing/${uid}`).set({ name: S.name || 'Anonymous', ts: Date.now() });
  S.typingTimer = setTimeout(() => {
    db.ref(`rooms/${S.room}/typing/${uid}`).remove();
  }, TYPING_TIMEOUT);
}

function listenTyping(roomId) {
  S.typingRef = db.ref(`rooms/${roomId}/typing`);
  S.typingRef.on('value', snap => {
    const data = snap.val() || {};
    const now = Date.now();
    const active = Object.entries(data)
      .filter(([id, d]) => id !== uid && now - d.ts < TYPING_TIMEOUT + 1000)
      .map(([_, d]) => d.name);

    const row = document.getElementById('typingRow');
    if (active.length) {
      row.innerHTML = `<div class="dots"><i></i><i></i><i></i></div><span>${active.join(', ')} ${active.length === 1 ? 'is' : 'are'} typing…</span>`;
    } else {
      row.innerHTML = '';
    }
  });
}

// ─── FIREBASE: PRESENCE ──────────────────────────────────────────────────────
function setupPresence() {
  // Use Firebase's built-in onDisconnect for clean presence
  const presRef = db.ref(`presence/${uid}`);
  const connectedRef = db.ref('.info/connected');

  connectedRef.on('value', snap => {
    if (snap.val() === false) return;
    presRef.onDisconnect().remove();
    presRef.set({ room: S.room, name: S.name || 'Anonymous', avatar: S.avatar, ts: Date.now() });
  });

  S.presenceRef = presRef;
}

function updatePresenceFirebase() {
  if (!S.presenceRef) return;
  S.presenceRef.set({ room: S.room, name: S.name || 'Anonymous', avatar: S.avatar, ts: Date.now() });
}

function listenPresence() {
  db.ref('presence').on('value', snap => {
    const data = snap.val() || {};
    const count = Object.keys(data).length;
    document.getElementById('onlineCount').textContent = count + (count === 1 ? ' online' : ' online');

    // Update room badges
    const roomCounts = {};
    Object.values(data).forEach(d => { roomCounts[d.room] = (roomCounts[d.room] || 0) + 1; });
    ROOMS.forEach(r => {
      const badge = document.getElementById('badge_' + r.id);
      if (!badge) return;
      const c = roomCounts[r.id] || 0;
      if (c > 0 && r.id !== S.room) {
        badge.textContent = c;
        badge.style.display = '';
      }
    });
  });
}

// ─── RENDER MESSAGES ─────────────────────────────────────────────────────────
function renderMessages(msgs, scroll=false) {
  const wrap = document.getElementById('msgsWrap');
  if (!msgs || msgs.length === 0) {
    wrap.innerHTML = `
      <div class="empty">
        <div class="e-icon">✦</div>
        <div class="e-big">Fresh Start</div>
        <div class="e-sub">Be the first to drop a message</div>
      </div>`;
    return;
  }

  const atBottom = wrap.scrollHeight - wrap.scrollTop - wrap.clientHeight < 60;
  wrap.innerHTML = '';
  let prevDate = null, prevUid = null;

  msgs.forEach(m => {
    const d = new Date(m.ts);
    const dateStr = d.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });

    if (dateStr !== prevDate) {
      const sep = document.createElement('div');
      sep.className = 'date-sep';
      sep.textContent = dateStr;
      wrap.appendChild(sep);
      prevDate = dateStr;
      prevUid  = null;
    }

    const isSelf   = m.uid === uid;
    const showName = m.uid !== prevUid;
    prevUid = m.uid;

    const row = document.createElement('div');
    row.className = 'msg-row' + (isSelf ? ' me' : '');

    const av = document.createElement('div');
    av.className = 'msg-av';
    av.textContent = m.avatar || '👤';
    av.style.background = COLORS[hashStr(m.uid) % COLORS.length];

    const body = document.createElement('div');
    body.className = 'msg-body';

    if (showName) {
      const who = document.createElement('div');
      who.className = 'msg-who';
      who.textContent = isSelf ? 'You' : m.name;
      body.appendChild(who);
    }

    const bub = document.createElement('div');
    bub.className = 'bubble';
    bub.textContent = m.text;

    const ts = document.createElement('div');
    ts.className = 'msg-ts';
    ts.textContent = d.toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit' });

    body.appendChild(bub);
    body.appendChild(ts);
    row.appendChild(av);
    row.appendChild(body);
    wrap.appendChild(row);
  });

  if (scroll || atBottom) setTimeout(() => wrap.scrollTop = wrap.scrollHeight, 30);
}

// ─── LOCAL STORAGE FALLBACK ───────────────────────────────────────────────────
function loadMsgsLocal(room) {
  try { return JSON.parse(localStorage.getItem('nx_msgs_' + room) || '[]'); } catch { return []; }
}
function saveMsgsLocal(room, msgs) {
  if (msgs.length > MAX_MSGS) msgs = msgs.slice(-MAX_MSGS);
  localStorage.setItem('nx_msgs_' + room, JSON.stringify(msgs));
}

let localPollTimer = null;
function switchRoomLocalFallback(id) {
  if (localPollTimer) clearInterval(localPollTimer);
  renderMessages(loadMsgsLocal(id), true);
  localPollTimer = setInterval(() => {
    renderMessages(loadMsgsLocal(S.room), false);
  }, 2000);
  window.addEventListener('storage', e => {
    if (e.key === 'nx_msgs_' + S.room) renderMessages(loadMsgsLocal(S.room), true);
  });
}

// ─── UTILS ────────────────────────────────────────────────────────────────────
function hashStr(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = (Math.imul(31, h) + s.charCodeAt(i)) | 0;
  return Math.abs(h);
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = '';
  el.innerHTML = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 4000);
}

// ─── GO ───────────────────────────────────────────────────────────────────────
init();
</script>
